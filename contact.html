<body class="formulaire">
    <nav>
        <div class="profile">
            <img src="./images/matete.jpg">
            <h1>Thomas Fanouillère</h1>
        </div>
        <ul>
            <a href="index.html">
                <li>Accueil</li>

        </ul>

    <div id="contenerform">
        <form>
            <h1>Me contacter</h1>
            <div class="separation"></div>
                <div class="corps-formulaire">
                    <div class="gauche">
                        <div class="groupe">
                            <label>Votre prénom</label>
                            <input type="text">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="groupe">
                            <label>Votre nom</label>
                            <input type="text">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="groupe">
                            <label>Votre adresse e-mail</label>
                            <input type="text">
                            <i class="fa-solid fa-square-envelope"></i>
                        </div>
                    </div>
                    <div class="droite">
                        <div class="groupe">
                            <label>Message</label>
                            <textarea></textarea>
                        </div>
                    </div>
                </div>
                <div class="pied-formulaire" align="center">
                    <button><a href="#">Envoyer un message</a></button>
                </div>
                <footer>
                    <p>Copyright 2022 @ Thomas Fanouillère - All rights reserved</p>
                </footer>
                
            </div>
